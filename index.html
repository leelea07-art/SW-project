<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안암 밥약 식당 추천봇</title>
    <style>
        :root {
            --ku-crimson: #8A1538;
            --light-gray: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--ku-crimson);
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
        }
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            background: var(--light-gray);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
        }
        .checkbox-item input {
            margin-right: 8px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .slider-container input {
            flex: 1;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--ku-crimson);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #6b102b;
        }
        #result-section {
            margin-top: 30px;
            display: none;
        }
        #result-section h2 {
            color: var(--ku-crimson);
            border-bottom: 2px solid var(--ku-crimson);
            padding-bottom: 5px;
        }
        .restaurant-card {
            background: var(--light-gray);
            border-left: 5px solid var(--ku-crimson);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 8px 8px 0;
        }
        .restaurant-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #111;
            margin-bottom: 5px;
        }
        .restaurant-meta {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .recommend-reason {
            background: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            border: 1px dashed #ccc;
        }
    </style>
</head>
<body>

<div class="container">
    <h1> 안암 밥약 식당 추천봇</h1>
    <div class="subtitle">조건을 입력하시면 1분 안에 최적의 식당을 추천해 드립니다!</div>

    <form id="recommend-form" onsubmit="generateRecommendation(event)">
        <div class="form-group">
            <label> 현재 위치 (출발지)</label>
            <input type="text" placeholder="예: 정경대 후문, 신공학관, 참살이길" required>
        </div>

        <div class="form-group">
            <label> 예산 (1인 기준)</label>
            <select required>
                <option value="1">1만원 이하</option>
                <option value="2">1만 ~ 1만 5천원</option>
                <option value="3">1만 5천원 ~ 2만원</option>
                <option value="4">제한 없음</option>
            </select>
        </div>

        <div class="form-group">
            <label> 음식 종류 (중복 선택 가능)</label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" name="foodType" value="한식" checked>한식</label>
                <label class="checkbox-item"><input type="checkbox" name="foodType" value="중식">중식</label>
                <label class="checkbox-item"><input type="checkbox" name="foodType" value="일식">일식</label>
                <label class="checkbox-item"><input type="checkbox" name="foodType" value="양식">양식</label>
                <label class="checkbox-item"><input type="checkbox" name="foodType" value="술집">술집</label>
                <label class="checkbox-item"><input type="checkbox" name="foodType" value="카페">카페</label>
            </div>
        </div>

        <div class="form-group">
            <label>👥 인원수</label>
            <input type="number" min="1" value="2" required>
        </div>

        <div class="form-group">
            <label>🏃 이동 가능 시간 (도보)</label>
            <div class="slider-container">
                <input type="range" id="time-range" min="5" max="30" step="5" value="10" oninput="updateTimeText(this.value)">
                <span id="time-value"><strong style="color:var(--ku-crimson);">10분</strong> 이내</span>
            </div>
        </div>

        <button type="submit"> 조건에 맞는 식당 추천받기</button>
    </form>

    <div id="result-section">
        <h2>✨ 추천 식당 결과 (최적 3선)</h2>
        <div id="restaurant-list"></div>
    </div>
</div>

<script>
    function updateTimeText(val) {
        document.getElementById('time-value').innerHTML = `<strong style="color:var(--ku-crimson);">${val}분</strong> 이내`;
    }

    function generateRecommendation(event) {
        event.preventDefault();

        const mockRestaurants = [
            { name: "고대맛집 한식경", category: "한식", price: "12,000원", time: "도보 7분", location: "참살이길 중반", hours: "11:00 ~ 21:00", seats: "40석", phone: "02-123-4567", rating: "4.7/5.0", waiting: "약 10분", reason: "깔끔한 1인 반상 위주로 나와 선후배 간 어색한 첫 밥약 자리에 정갈하게 먹기 좋습니다." },
            { name: "안암 파스타하우스", category: "양식", price: "14,000원", time: "도보 5분", location: "정경대 후문 인근", hours: "11:30 ~ 21:30", seats: "30석", phone: "02-987-6543", rating: "4.5/5.0", waiting: "바로 입장 가능", reason: "이동 시간이 짧아 다음 강의 시간 맞추기 용이하며, 가성비 좋은 양식으로 교수님과의 가벼운 식사에도 적합합니다." },
            { name: "쿠이 시스시", category: "일식", price: "15,000원", time: "도보 10분", location: "안암역 3번 출구", hours: "11:30 ~ 22:00", seats: "25석", phone: "02-555-5555", rating: "4.8/5.0", waiting: "약 15분", reason: "조용한 분위기에서 진지한 동기/선후배 간의 깊은 대화를 나누며 밥약하기 좋은 최적의 장소입니다." }
        ];

        const listContainer = document.getElementById('restaurant-list');
        listContainer.innerHTML = '';

        mockRestaurants.forEach(rest => {
            const card = document.createElement('div');
            card.className = 'restaurant-card';
            card.innerHTML = `
                <div class="restaurant-name">${rest.name} <span style="font-size:0.9rem; color:var(--ku-crimson);">[${rest.category}]</span></div>
                <div class="restaurant-meta">
                    <strong> 위치:</strong> ${rest.location} (${rest.time}) | <strong> 평균 가격:</strong> ${rest.price}<br>
                    <strong> 영업:</strong> ${rest.hours} | <strong> 좌석수:</strong> ${rest.seats} | <strong> 문의:</strong> ${rest.phone}<br>
                    <strong> 평점:</strong> ${rest.rating} | <strong> 예상 웨이팅:</strong> <span style="color:red; font-weight:bold;">${rest.waiting}</span>
                </div>
                <div class="recommend-reason">
                    <strong> 추천 이유:</strong> ${rest.reason}
                </div>
            `;
            listContainer.appendChild(card);
        });

        const resultSection = document.getElementById('result-section');
        resultSection.style.display = 'block';
        resultSection.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
